name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # CHECKOUT CODE
      # =========================
      - name: Checkout Repo
        uses: actions/checkout@v4

      # =========================
      # SETUP NODE
      # =========================
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # =========================
      # INSTALL & BUILD REACT
      # =========================
      - name: Install Frontend Dependencies
        working-directory: ./alk-app
        run: npm install

      - name: Build React App
        working-directory: ./alk-app
        run: npm run build

      # =========================
      # SETUP PHP
      # =========================
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2

      # =========================
      # INSTALL LARAVEL DEPENDENCIES
      # =========================
      - name: Install Composer Dependencies
        working-directory: ./alk-api
        run: composer install --no-dev --optimize-autoloader

      # =========================
      # SETUP SSH
      # =========================
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh

          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/id_ed25519

          chmod 600 ~/.ssh/id_ed25519

          ssh-keyscan -p ${{ secrets.HOSTINGER_PORT }} \
          ${{ secrets.HOSTINGER_HOST }} >> ~/.ssh/known_hosts

      # =========================
      # CREATE REQUIRED DIRECTORIES
      # =========================
      - name: Create Directories
        run: |
          ssh -p ${{ secrets.HOSTINGER_PORT }} \
          ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} << 'EOF'

          mkdir -p ~/domains/erpalkamaris.com/public_html/assets
          mkdir -p ~/domains/erpalkamaris.com/public_html/laravel-api

          EOF

      # =========================
      # DEPLOY REACT ASSETS
      # =========================
      - name: Deploy React Assets
        run: |
          rsync -avz --delete \
          -e "ssh -p ${{ secrets.HOSTINGER_PORT }}" \
          alk-app/dist/assets/ \
          ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:/home/${{ secrets.HOSTINGER_USER }}/domains/erpalkamaris.com/public_html/assets/

      # =========================
      # DEPLOY REACT INDEX.HTML
      # =========================
      - name: Deploy React Index
        run: |
          rsync -avz \
          -e "ssh -p ${{ secrets.HOSTINGER_PORT }}" \
          alk-app/dist/index.html \
          ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:/home/${{ secrets.HOSTINGER_USER }}/domains/erpalkamaris.com/public_html/

      # =========================
      # DEPLOY LARAVEL API
      # =========================
      - name: Deploy Laravel API
        run: |
          rsync -avz --delete \
          --exclude '.env' \
          --exclude 'vendor' \
          --exclude 'node_modules' \
          --exclude 'storage' \
          --exclude 'public/storage' \
          -e "ssh -p ${{ secrets.HOSTINGER_PORT }}" \
          alk-api/ \
          ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:/home/${{ secrets.HOSTINGER_USER }}/domains/erpalkamaris.com/public_html/laravel-api/

      # =========================
      # RUN LARAVEL COMMANDS
      # =========================
      - name: Run Laravel Commands
        run: |
          ssh -p ${{ secrets.HOSTINGER_PORT }} \
          ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} << 'EOF'

          API_DIR="/home/${{ secrets.HOSTINGER_USER }}/domains/erpalkamaris.com/public_html/laravel-api"
          STORAGE_TARGET="$API_DIR/storage/app/public"
          PUBLIC_LINK="$API_DIR/public/storage"

          cd "$API_DIR"

          mkdir -p "$STORAGE_TARGET"
          mkdir -p storage/framework/cache/data storage/framework/sessions storage/framework/testing storage/framework/views storage/logs

          if [ -L "$PUBLIC_LINK" ]; then
            rm "$PUBLIC_LINK"
          elif [ -d "$PUBLIC_LINK" ]; then
            cp -a "$PUBLIC_LINK/." "$STORAGE_TARGET/"
            mv "$PUBLIC_LINK" "$API_DIR/public/storage.backup.$(date +%Y%m%d%H%M%S)"
          elif [ -e "$PUBLIC_LINK" ]; then
            mv "$PUBLIC_LINK" "$API_DIR/public/storage.backup.$(date +%Y%m%d%H%M%S)"
          fi

          if [ -z "$(find "$STORAGE_TARGET" -type f -print -quit)" ]; then
            LATEST_STORAGE_BACKUP="$(find "$API_DIR/public" -maxdepth 1 -type d -name 'storage.backup.*' | sort | tail -n 1)"
            if [ -n "$LATEST_STORAGE_BACKUP" ]; then
              cp -a "$LATEST_STORAGE_BACKUP/." "$STORAGE_TARGET/"
              echo "Restored storage files from $LATEST_STORAGE_BACKUP"
            fi
          fi

          ln -s "$STORAGE_TARGET" "$PUBLIC_LINK"

          composer install --no-dev --optimize-autoloader
          php artisan migrate --force
          php artisan config:clear
          php artisan cache:clear
          php artisan route:clear
          php artisan view:clear

          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          php artisan optimize:clear

          if [ ! -L "$PUBLIC_LINK" ]; then
            echo "public/storage is not a symlink"
            exit 1
          fi

          echo "public/storage -> $(readlink "$PUBLIC_LINK")"
          echo "storage/app/public file count: $(find "$STORAGE_TARGET" -type f | wc -l)"

          EOF
